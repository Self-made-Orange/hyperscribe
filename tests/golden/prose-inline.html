<!doctype html>
<html lang="en" data-theme="studio">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Prose</title>
  <style>/* ===== Studio theme — light is default, [data-mode="dark"] overrides ===== */

[data-theme="studio"] {
  /* Surfaces */
  --hs-color-fg: rgba(0, 0, 0, 0.95);
  --hs-color-bg: #ffffff;
  --hs-color-surface: #ffffff;
  --hs-color-surface-alt: #f6f5f4;
  --hs-color-surface-dark: #31302e;

  /* Foreground */
  --hs-color-fg-muted: #615d59;
  --hs-color-fg-placeholder: #a39e98;

  /* Chrome accents */
  --hs-color-accent: #0075de;
  --hs-color-accent-active: #005bab;
  --hs-color-navy: #213183;
  --hs-color-purple: #391c57;
  --hs-color-pink: #ff64c8;
  --hs-color-teal: #2a9d99;
  --hs-color-brown: #523410;
  --hs-color-focus: #097fe8;
  --hs-color-badge-bg: #f2f9ff;
  --hs-color-badge-text: #097fe8;
  --hs-color-success: #1aae39;
  --hs-color-warn: #dd5b00;

  /* Borders & shadows */
  --hs-border-whisper: 1px solid rgba(0, 0, 0, 0.1);
  --hs-shadow-card: rgba(0,0,0,0.04) 0 4px 18px,
                    rgba(0,0,0,0.027) 0 2.025px 7.84688px,
                    rgba(0,0,0,0.02) 0 0.8px 2.925px,
                    rgba(0,0,0,0.01) 0 0.175px 1.04062px;
  --hs-shadow-deep: rgba(0,0,0,0.01) 0 1px 3px,
                    rgba(0,0,0,0.02) 0 3px 7px,
                    rgba(0,0,0,0.02) 0 7px 15px,
                    rgba(0,0,0,0.04) 0 14px 28px,
                    rgba(0,0,0,0.05) 0 23px 52px;

  /* Typography */
  --hs-font-sans: "NotionInter", Inter, -apple-system, system-ui,
                  "Segoe UI", Helvetica, "Apple Color Emoji", Arial,
                  "Segoe UI Emoji", "Segoe UI Symbol";
  --hs-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular,
                  Menlo, Consolas, monospace;

  /* Semantic tones (Callout, Comparison verdict, CodeDiff, KPI delta) */
  --hs-tone-info-bg:    #f2f9ff;
  --hs-tone-info-fg:    #097fe8;
  --hs-tone-warn-bg:    #fff8f0;
  --hs-tone-warn-fg:    #c2410c;
  --hs-tone-success-bg: #f1fbf3;
  --hs-tone-success-fg: #166534;
  --hs-tone-danger-bg:  #fff5f5;
  --hs-tone-danger-fg:  #991b1b;

  /* Note tint (Sequence, Mermaid note) */
  --hs-note-bg:     #fef9c3;
  --hs-note-border: #eab308;
  --hs-note-text:   #713f12;
}

[data-theme="studio"][data-mode="dark"] {
  --hs-color-fg: rgba(255, 255, 255, 0.94);
  --hs-color-bg: #191918;
  --hs-color-surface: #232322;
  --hs-color-surface-alt: #2a2a28;
  --hs-color-surface-dark: #0f0f0e;

  --hs-color-fg-muted: #a39e98;
  --hs-color-fg-placeholder: #6e6b67;

  --hs-color-accent: #4dabff;
  --hs-color-accent-active: #2d8de0;
  --hs-color-navy: #8891d0;
  --hs-color-purple: #c084fc;
  --hs-color-pink: #ff89d9;
  --hs-color-teal: #5eead4;
  --hs-color-brown: #a8784d;
  --hs-color-focus: #60a5fa;
  --hs-color-badge-bg: rgba(77, 171, 255, 0.12);
  --hs-color-badge-text: #7cc0ff;
  --hs-color-success: #4ade80;
  --hs-color-warn: #fb923c;

  --hs-border-whisper: 1px solid rgba(255, 255, 255, 0.08);
  --hs-shadow-card: rgba(0,0,0,0.35) 0 4px 18px,
                    rgba(0,0,0,0.25) 0 2.025px 7.84688px,
                    rgba(0,0,0,0.18) 0 0.8px 2.925px,
                    rgba(0,0,0,0.12) 0 0.175px 1.04062px;
  --hs-shadow-deep: rgba(0,0,0,0.15) 0 1px 3px,
                    rgba(0,0,0,0.25) 0 3px 7px,
                    rgba(0,0,0,0.3) 0 7px 15px,
                    rgba(0,0,0,0.4) 0 14px 28px,
                    rgba(0,0,0,0.5) 0 23px 52px;

  --hs-tone-info-bg:    rgba(77, 171, 255, 0.12);
  --hs-tone-info-fg:    #7cc0ff;
  --hs-tone-warn-bg:    rgba(251, 146, 60, 0.14);
  --hs-tone-warn-fg:    #fdba74;
  --hs-tone-success-bg: rgba(74, 222, 128, 0.12);
  --hs-tone-success-fg: #86efac;
  --hs-tone-danger-bg:  rgba(248, 113, 113, 0.15);
  --hs-tone-danger-fg:  #fca5a5;

  --hs-note-bg:     rgba(234, 179, 8, 0.15);
  --hs-note-border: #eab308;
  --hs-note-text:   #fde68a;
}

:root {
  /* === Spacing === */
  --hs-space-1: 4px;
  --hs-space-2: 8px;
  --hs-space-3: 12px;
  --hs-space-4: 16px;
  --hs-space-5: 24px;
  --hs-space-6: 32px;
  --hs-space-8: 64px;
  --hs-space-10: 120px;

  /* === Radius === */
  --hs-radius-micro: 4px;
  --hs-radius-subtle: 5px;
  --hs-radius-std: 8px;
  --hs-radius-comfort: 12px;
  --hs-radius-large: 16px;
  --hs-radius-pill: 9999px;

  --hs-container-max: 1200px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--hs-font-sans);
  font-size: 16px;
  line-height: 1.5;
  color: var(--hs-color-fg);
  background: var(--hs-color-bg);
  -webkit-font-smoothing: antialiased;
}

/* === Page === */
.hs-page {
  max-width: var(--hs-container-max);
  margin: 0 auto;
  padding: var(--hs-space-8) var(--hs-space-5);
}
.hs-page-header { margin-bottom: var(--hs-space-6); }
.hs-page-title {
  font-size: 64px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -2.125px;
  margin: 0 0 var(--hs-space-3);
  font-feature-settings: "lnum", "locl";
}
.hs-page-subtitle {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.4;
  letter-spacing: -0.125px;
  color: var(--hs-color-fg-muted);
  margin: 0;
}

/* === Section === */
.hs-section { margin-top: var(--hs-space-8); }
.hs-section-title {
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -1.5px;
  margin: 0 0 var(--hs-space-4);
  font-feature-settings: "lnum", "locl";
}
.hs-section-lead {
  color: var(--hs-color-fg-muted);
  font-size: 20px;
  font-weight: 600;
  line-height: 1.4;
  margin: 0 0 var(--hs-space-5);
}
.hs-section-lead p { margin: 0; }
.hs-section-body > * + * { margin-top: var(--hs-space-4); }

/* === Headings === */
.hs-heading { margin: var(--hs-space-5) 0 var(--hs-space-3); font-weight: 700; }
.hs-heading-h2 {
  font-size: 40px;
  line-height: 1.5;
  font-feature-settings: "lnum", "locl";
}
.hs-heading-h3 {
  font-size: 26px;
  line-height: 1.23;
  letter-spacing: -0.625px;
}
.hs-heading-h4 {
  font-size: 22px;
  line-height: 1.27;
  letter-spacing: -0.25px;
}

/* === Prose === */
.hs-prose { line-height: 1.5; }
.hs-prose p { margin: 0 0 var(--hs-space-3); }
.hs-prose p:last-child { margin-bottom: 0; }
.hs-prose strong { font-weight: 600; }
.hs-prose em { font-style: italic; }
.hs-prose code {
  font-family: var(--hs-font-mono);
  font-size: 0.9em;
  background: var(--hs-color-surface-alt);
  padding: 2px 5px;
  border-radius: var(--hs-radius-micro);
}
.hs-prose a {
  color: var(--hs-color-accent);
  text-decoration: none;
}
.hs-prose a:hover { text-decoration: underline; }
.hs-prose ul, .hs-prose ol {
  margin: 0 0 var(--hs-space-3);
  padding-left: var(--hs-space-5);
}
.hs-prose li { margin-bottom: var(--hs-space-1); }

/* === Light/Dark mode toggler (always present, fixed to top-right) === */
.hs-mode-toggler {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--hs-color-surface);
  color: var(--hs-color-fg);
  border: var(--hs-border-whisper);
  border-radius: var(--hs-radius-pill);
  padding: 0;
  cursor: pointer;
  box-shadow: var(--hs-shadow-card);
  transition: transform 120ms ease, background 120ms ease;
}
.hs-mode-toggler:hover { transform: translateY(-1px); }
.hs-mode-toggler:active { transform: translateY(0); }
.hs-mode-toggler:focus-visible {
  outline: 2px solid var(--hs-color-focus);
  outline-offset: 2px;
}
/* Show moon in light mode (click → dark), sun in dark mode (click → light) */
html[data-mode="dark"] .hs-mode-icon-moon { display: none; }
html[data-mode="dark"] .hs-mode-icon-sun  { display: block; }
html:not([data-mode="dark"]) .hs-mode-icon-moon { display: block; }
html:not([data-mode="dark"]) .hs-mode-icon-sun  { display: none; }
</style>
</head>
<body>
<article class="hs-page"><header class="hs-page-header"><h1 class="hs-page-title">Prose</h1></header><main class="hs-page-main"><div class="hs-prose"><p><strong>Bold</strong>, <em>italic</em>, and <code>code</code>.</p>
<ul><li>item one</li><li>item <strong>two</strong></li></ul>
<ol><li>first</li><li>second</li></ol>
<p>Links: <a href="https://example.com">site</a>.</p></div></main></article>
<button type="button" class="hs-mode-toggler" id="hs-mode-toggler" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
  <svg class="hs-mode-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  <svg class="hs-mode-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<script>(function(){
  var KEY='hyperscribe.mode';
  var saved=null;try{saved=localStorage.getItem(KEY);}catch(e){}
  var ssr = document.documentElement.getAttribute('data-mode');
  var mode = saved || ssr;
  if (!mode) {
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    mode = prefersDark ? 'dark' : 'light';
  }
  function apply(m){
    document.documentElement.setAttribute('data-mode', m);
    try{localStorage.setItem(KEY, m);}catch(e){}
  }
  apply(mode);
  var btn=document.getElementById('hs-mode-toggler');
  if(btn){btn.addEventListener('click',function(){
    var next = document.documentElement.getAttribute('data-mode') === 'dark' ? 'light' : 'dark';
    apply(next);
  });}
})();</script>
</body>
</html>
