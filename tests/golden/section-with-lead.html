<!doctype html>
<html lang="en" data-theme="studio">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>X</title>
  <style>/* ===== Studio theme — Airtable-inspired: clean enterprise canvas + Airtable Blue ===== */

@import url('https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

[data-theme="studio"] {
  /* Surfaces — white canvas with deep navy ink */
  --hs-color-fg: #181d26;                            /* Deep Navy */
  --hs-color-bg: #ffffff;
  --hs-color-surface: #ffffff;
  --hs-color-surface-alt: #f8fafc;                   /* Light Surface */
  --hs-color-surface-dark: #181d26;

  --hs-color-fg-muted: rgba(4, 14, 32, 0.69);        /* Weak Text */
  --hs-color-fg-placeholder: #b7bbc1;

  /* Chrome — Airtable Blue reserved for interactive accents */
  --hs-color-accent: #1b61c9;                        /* Airtable Blue */
  --hs-color-accent-active: #254fad;                 /* Mid Blue */
  --hs-color-navy: #181d26;
  --hs-color-purple: #5856d6;
  --hs-color-pink: #d53992;
  --hs-color-teal: #17a2b8;
  --hs-color-brown: #8b5e3c;
  --hs-color-focus: #1b61c9;
  --hs-color-badge-bg: rgba(27, 97, 201, 0.08);
  --hs-color-badge-text: #1b61c9;
  --hs-color-success: #006400;
  --hs-color-warn: #b45309;

  /* Signature Airtable blue-tinted multi-layer shadow */
  --hs-border-whisper: 1px solid #e0e2e6;
  --hs-shadow-card: rgba(0, 0, 0, 0.32) 0 0 1px,
                    rgba(0, 0, 0, 0.08) 0 0 2px,
                    rgba(45, 127, 249, 0.28) 0 1px 3px,
                    rgba(0, 0, 0, 0.06) 0 0 0 0.5px inset;
  --hs-shadow-deep: rgba(15, 48, 106, 0.05) 0 0 20px,
                    rgba(45, 127, 249, 0.18) 0 10px 30px;

  /* Haas → Inter Tight substitute (near-identical Swiss-precision geometry) */
  --hs-font-sans: "Inter Tight", "Haas", -apple-system, BlinkMacSystemFont,
                  "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --hs-font-display: "Inter Tight", "Haas Groot Disp", "Haas", -apple-system, sans-serif;
  --hs-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  --hs-tone-info-bg:    rgba(27, 97, 201, 0.08);
  --hs-tone-info-fg:    #1b61c9;
  --hs-tone-warn-bg:    rgba(180, 83, 9, 0.10);
  --hs-tone-warn-fg:    #b45309;
  --hs-tone-success-bg: rgba(0, 100, 0, 0.10);
  --hs-tone-success-fg: #006400;
  --hs-tone-danger-bg:  rgba(215, 58, 73, 0.10);
  --hs-tone-danger-fg:  #d73a49;

  --hs-note-bg:     #fef9c3;
  --hs-note-border: #eab308;
  --hs-note-text:   #713f12;
}

[data-theme="studio"][data-mode="dark"] {
  --hs-color-fg: rgba(249, 252, 255, 0.97);
  --hs-color-bg: #0d1117;
  --hs-color-surface: #161b22;
  --hs-color-surface-alt: #1f2937;
  --hs-color-surface-dark: #010409;

  --hs-color-fg-muted: rgba(249, 252, 255, 0.62);
  --hs-color-fg-placeholder: rgba(249, 252, 255, 0.4);

  --hs-color-accent: #4c8df5;
  --hs-color-accent-active: #7db0ff;
  --hs-color-focus: #4c8df5;
  --hs-color-badge-bg: rgba(76, 141, 245, 0.14);
  --hs-color-badge-text: #7db0ff;
  --hs-color-success: #4ade80;
  --hs-color-warn: #fb923c;

  --hs-border-whisper: 1px solid #30363d;
  --hs-shadow-card: rgba(0, 0, 0, 0.5) 0 0 1px,
                    rgba(0, 0, 0, 0.3) 0 0 2px,
                    rgba(45, 127, 249, 0.35) 0 1px 3px,
                    rgba(255, 255, 255, 0.04) 0 0 0 0.5px inset;
  --hs-shadow-deep: rgba(0, 0, 0, 0.55) 0 0 20px,
                    rgba(45, 127, 249, 0.25) 0 10px 30px;

  --hs-tone-info-bg:    rgba(76, 141, 245, 0.14);
  --hs-tone-info-fg:    #7db0ff;
  --hs-tone-warn-bg:    rgba(251, 146, 60, 0.14);
  --hs-tone-warn-fg:    #fdba74;
  --hs-tone-success-bg: rgba(74, 222, 128, 0.14);
  --hs-tone-success-fg: #86efac;
  --hs-tone-danger-bg:  rgba(248, 113, 113, 0.14);
  --hs-tone-danger-fg:  #fca5a5;

  --hs-note-bg:     rgba(234, 179, 8, 0.15);
  --hs-note-border: #eab308;
  --hs-note-text:   #fde68a;
}

/* === Studio character: Swiss-precision typography with positive body tracking === */
[data-theme="studio"] body {
  font-feature-settings: "ss01", "cv11";
}
[data-theme="studio"] .hs-page-title {
  font-family: var(--hs-font-display);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
[data-theme="studio"] .hs-section-title {
  font-family: var(--hs-font-display);
  font-weight: 500;
  letter-spacing: -0.012em;
  line-height: 1.15;
}
[data-theme="studio"] .hs-heading-h2,
[data-theme="studio"] .hs-heading-h3,
[data-theme="studio"] .hs-heading-h4 {
  font-weight: 500;
}
[data-theme="studio"] .hs-page-subtitle,
[data-theme="studio"] .hs-section-lead {
  font-weight: 400;
  letter-spacing: 0.006em;    /* ~0.1px at 16px — Airtable body tracking */
}
[data-theme="studio"] .hs-prose {
  letter-spacing: 0.011em;    /* ~0.18px at 16px */
  line-height: 1.55;
}

:root {
  /* === Spacing === */
  --hs-space-1: 4px;
  --hs-space-2: 8px;
  --hs-space-3: 12px;
  --hs-space-4: 16px;
  --hs-space-5: 24px;
  --hs-space-6: 32px;
  --hs-space-8: 64px;
  --hs-space-10: 120px;

  /* === Radius === */
  --hs-radius-micro: 4px;
  --hs-radius-subtle: 5px;
  --hs-radius-std: 8px;
  --hs-radius-comfort: 12px;
  --hs-radius-large: 16px;
  --hs-radius-pill: 9999px;

  --hs-container-max: 1200px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--hs-font-sans);
  font-size: 15px;
  line-height: 1.5;
  color: var(--hs-color-fg);
  background: var(--hs-color-bg);
  -webkit-font-smoothing: antialiased;
}

/* === Page === */
.hs-page {
  max-width: var(--hs-container-max);
  margin: 0 auto;
  padding: var(--hs-space-8) var(--hs-space-5);
}
.hs-page-header { margin-bottom: var(--hs-space-6); }
.hs-page-title {
  font-size: 40px;
  font-weight: 700;
  line-height: 1.06;
  letter-spacing: -1.2px;
  margin: 0 0 var(--hs-space-3);
  font-feature-settings: "lnum", "locl";
}
.hs-page-subtitle {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.45;
  letter-spacing: -0.08px;
  color: var(--hs-color-fg-muted);
  margin: 0;
}

/* === Section === */
.hs-section { margin-top: var(--hs-space-8); }
.hs-section-title {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.8px;
  margin: 0 0 var(--hs-space-4);
  font-feature-settings: "lnum", "locl";
}
.hs-section-lead {
  color: var(--hs-color-fg-muted);
  font-size: 16px;
  font-weight: 600;
  line-height: 1.45;
  margin: 0 0 var(--hs-space-5);
}
.hs-section-lead p { margin: 0; }
.hs-section-body > * + * { margin-top: var(--hs-space-4); }

/* === Headings === */
.hs-heading { margin: var(--hs-space-5) 0 var(--hs-space-3); font-weight: 700; }
.hs-heading-h2 {
  font-size: 26px;
  line-height: 1.20;
  letter-spacing: -0.4px;
  font-feature-settings: "lnum", "locl";
}
.hs-heading-h3 {
  font-size: 19px;
  line-height: 1.30;
  letter-spacing: -0.35px;
}
.hs-heading-h4 {
  font-size: 16px;
  line-height: 1.36;
  letter-spacing: -0.14px;
}

/* === Prose === */
.hs-prose { line-height: 1.5; }
.hs-prose p { margin: 0 0 var(--hs-space-3); }
.hs-prose p:last-child { margin-bottom: 0; }
.hs-prose strong { font-weight: 600; }
.hs-prose em { font-style: italic; }
.hs-prose code {
  font-family: var(--hs-font-mono);
  font-size: 0.9em;
  background: var(--hs-color-surface-alt);
  padding: 2px 5px;
  border-radius: var(--hs-radius-micro);
}
.hs-section-lead code,
.hs-callout-body code {
  font-family: var(--hs-font-mono);
  font-size: 0.88em;
  background: color-mix(in srgb, var(--hs-color-surface-alt) 80%, var(--hs-color-bg));
  border: var(--hs-border-whisper);
  padding: 2px 6px;
  border-radius: var(--hs-radius-micro);
  overflow-wrap: anywhere;
}
.hs-prose a {
  color: var(--hs-color-accent);
  text-decoration: none;
}
.hs-prose a:hover { text-decoration: underline; }
.hs-prose ul, .hs-prose ol {
  margin: 0 0 var(--hs-space-3);
  padding-left: var(--hs-space-5);
}
.hs-prose li { margin-bottom: var(--hs-space-1); }

/* === Light/Dark mode toggler (always present, fixed to top-right) === */
.hs-mode-toggler {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  width: 36px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--hs-color-surface);
  color: var(--hs-color-fg);
  border: var(--hs-border-whisper);
  border-radius: var(--hs-radius-pill);
  padding: 0;
  cursor: pointer;
  box-shadow: var(--hs-shadow-card);
  transition: transform 120ms ease, background 120ms ease;
}
.hs-mode-toggler:hover { transform: translateY(-1px); }
.hs-mode-toggler:active { transform: translateY(0); }
.hs-mode-toggler:focus-visible {
  outline: 2px solid var(--hs-color-focus);
  outline-offset: 2px;
}
/* Show moon in light mode (click → dark), sun in dark mode (click → light) */
html[data-mode="dark"] .hs-mode-icon-moon { display: none; }
html[data-mode="dark"] .hs-mode-icon-sun  { display: block; }
html:not([data-mode="dark"]) .hs-mode-icon-moon { display: block; }
html:not([data-mode="dark"]) .hs-mode-icon-sun  { display: none; }

/* === Pan/zoom layer for SVG diagrams === */
.hs-zoomable {
  position: relative;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
.hs-zoomable .hs-zoom-stage {
  transform-origin: 0 0;
  cursor: grab;
  width: fit-content;
  min-width: 100%;
}
.hs-zoomable .hs-zoom-stage:active { cursor: grabbing; }
.hs-zoomable .hs-zoom-stage > svg { display: block; max-width: none; }

.hs-zoom-controls {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
  z-index: 10;
  pointer-events: auto;
}
.hs-zoom-btn {
  width: 28px;
  height: 28px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--hs-color-surface);
  color: var(--hs-color-fg);
  border: var(--hs-border-whisper);
  border-radius: var(--hs-radius-micro);
  cursor: pointer;
  font-size: 14px;
  font-family: var(--hs-font-sans);
  font-weight: 600;
  line-height: 1;
  box-shadow: var(--hs-shadow-card);
  transition: background 120ms ease, transform 80ms ease;
}
.hs-zoom-btn:hover { background: var(--hs-color-surface-alt); }
.hs-zoom-btn:active { transform: scale(0.94); }
.hs-zoom-btn:focus-visible {
  outline: 2px solid var(--hs-color-focus);
  outline-offset: 2px;
}

/* === KPICards auto-grid when adjacent in a section === */
.hs-section-body:has(> .hs-kpi + .hs-kpi) {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: var(--hs-space-3);
}
.hs-section-body:has(> .hs-kpi + .hs-kpi) > * + * { margin-top: 0; }

/* === Tables — horizontal scroll on narrow viewports === */
.hs-table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: var(--hs-space-4) 0;
  border-radius: var(--hs-radius-comfort);
}
.hs-table-wrap > .hs-table { margin: 0; min-width: 100%; }

/* === Responsive — tablet (≤960px) === */
@media (max-width: 960px) {
  .hs-page { padding: var(--hs-space-6) var(--hs-space-4); }
  .hs-page-title { font-size: 34px; letter-spacing: -0.9px; }
  .hs-section-title { font-size: 26px; letter-spacing: -0.55px; }
  .hs-heading-h2 { font-size: 22px; letter-spacing: -0.32px; }
  .hs-heading-h3 { font-size: 18px; letter-spacing: -0.28px; }
  .hs-heading-h4 { font-size: 15px; }
  .hs-section { margin-top: var(--hs-space-6); }
  .hs-kpi-value { font-size: 26px; }
}

/* === Responsive — mobile (≤640px) === */
@media (max-width: 640px) {
  html, body { font-size: 14px; }
  .hs-page {
    padding: var(--hs-space-5) var(--hs-space-3);
  }
  .hs-page-header { margin-bottom: var(--hs-space-5); }
  .hs-page-title {
    font-size: 24px;
    line-height: 1.10;
    letter-spacing: -0.55px;
  }
  .hs-page-subtitle {
    font-size: 14px;
    line-height: 1.45;
    letter-spacing: 0;
  }
  .hs-section { margin-top: var(--hs-space-5); }
  .hs-section-title {
    font-size: 20px;
    line-height: 1.18;
    letter-spacing: -0.34px;
    margin-bottom: var(--hs-space-3);
  }
  .hs-section-lead {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: var(--hs-space-4);
  }
  .hs-heading-h2 { font-size: 17px; line-height: 1.24; letter-spacing: -0.22px; }
  .hs-heading-h3 { font-size: 15px; line-height: 1.32; letter-spacing: -0.13px; }
  .hs-heading-h4 { font-size: 14px; line-height: 1.38; letter-spacing: -0.08px; }
  .hs-kpi-value { font-size: 19px; letter-spacing: -0.32px; }
  .hs-kpi-label { font-size: 11px; letter-spacing: 0.4px; }
  .hs-kpi { min-width: 0; padding: var(--hs-space-3); }
  .hs-table th, .hs-table td { padding: var(--hs-space-2); }
  .hs-table { font-size: 13px; }
  .hs-mode-toggler {
    top: 10px;
    right: 10px;
    width: 38px;
    height: 38px;
  }
  .hs-zoom-btn { width: 32px; height: 32px; font-size: 15px; }
  .hs-zoom-controls { top: 6px; right: 6px; gap: 6px; }
}

/* === Honor reduced-motion preferences === */
@media (prefers-reduced-motion: reduce) {
  .hs-mode-toggler, .hs-zoom-btn { transition: none; }
}
</style>
</head>
<body>
<article class="hs-page"><header class="hs-page-header"><h1 class="hs-page-title">X</h1></header><main class="hs-page-main"><section class="hs-section" id="a"><h2 class="hs-section-title">Section A</h2><div class="hs-section-lead"><p>This section has a <strong>lead</strong> paragraph with a <a href="https://example.com">link</a>.</p></div><div class="hs-section-body"></div></section></main></article>
<button type="button" class="hs-mode-toggler" id="hs-mode-toggler" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
  <svg class="hs-mode-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
  <svg class="hs-mode-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<script>(function(){
  var KEY='hyperscribe.mode';
  var saved=null;try{saved=localStorage.getItem(KEY);}catch(e){}
  var ssr = document.documentElement.getAttribute('data-mode');
  var mode = saved || ssr;
  if (!mode) {
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    mode = prefersDark ? 'dark' : 'light';
  }
  function apply(m){
    document.documentElement.setAttribute('data-mode', m);
    try{localStorage.setItem(KEY, m);}catch(e){}
  }
  apply(mode);
  var btn=document.getElementById('hs-mode-toggler');
  if(btn){btn.addEventListener('click',function(){
    var next = document.documentElement.getAttribute('data-mode') === 'dark' ? 'light' : 'dark';
    apply(next);
  });}
})();</script>
<script>/* Hyperscribe interactive layer — pan/zoom for SVG diagrams.
 * Any element tagged `.hs-zoomable` gets: mouse-drag pan, Ctrl/Cmd+wheel zoom,
 * and a small control bar (＋ / − / ⟲ reset) docked to the top-right corner. */
(function () {
  function initZoom(container) {
    if (container.dataset.hsZoomInit) return;
    container.dataset.hsZoomInit = "1";

    var stage = document.createElement("div");
    stage.className = "hs-zoom-stage";
    while (container.firstChild) stage.appendChild(container.firstChild);
    container.appendChild(stage);

    var controls = document.createElement("div");
    controls.className = "hs-zoom-controls";
    controls.innerHTML =
      '<button type="button" class="hs-zoom-btn" data-zoom="in" aria-label="Zoom in" title="Zoom in (Ctrl/Cmd + wheel)">＋</button>' +
      '<button type="button" class="hs-zoom-btn" data-zoom="out" aria-label="Zoom out" title="Zoom out">−</button>' +
      '<button type="button" class="hs-zoom-btn" data-zoom="reset" aria-label="Reset zoom" title="Reset">⟲</button>';
    container.appendChild(controls);

    var scale = 1;
    var tx = 0;
    var ty = 0;
    var MIN = 0.2;
    var MAX = 5;

    function apply() {
      stage.style.transform = "translate(" + tx + "px," + ty + "px) scale(" + scale + ")";
    }

    function clampScale(next) {
      return Math.max(MIN, Math.min(MAX, next));
    }

    function zoomAt(newScale, cx, cy) {
      var next = clampScale(newScale);
      if (next === scale) return;
      var ratio = next / scale;
      tx = cx - (cx - tx) * ratio;
      ty = cy - (cy - ty) * ratio;
      scale = next;
      apply();
    }

    function reset() {
      scale = 1;
      tx = 0;
      ty = 0;
      apply();
    }

    function center() {
      return { cx: container.clientWidth / 2, cy: container.clientHeight / 2 };
    }

    controls.addEventListener("click", function (event) {
      var btn = event.target.closest(".hs-zoom-btn");
      if (!btn) return;
      var op = btn.getAttribute("data-zoom");
      var c = center();
      if (op === "in") zoomAt(scale * 1.25, c.cx, c.cy);
      else if (op === "out") zoomAt(scale / 1.25, c.cx, c.cy);
      else reset();
    });

    container.addEventListener("wheel", function (event) {
      if (!(event.ctrlKey || event.metaKey)) return;
      event.preventDefault();
      var rect = container.getBoundingClientRect();
      var cx = event.clientX - rect.left;
      var cy = event.clientY - rect.top;
      var factor = event.deltaY < 0 ? 1.1 : 1 / 1.1;
      zoomAt(scale * factor, cx, cy);
    }, { passive: false });

    var dragging = false;
    var lastX = 0;
    var lastY = 0;
    var activePointer = null;

    stage.addEventListener("pointerdown", function (event) {
      if (event.button !== 0) return;
      if (event.target.closest(".hs-zoom-controls")) return;
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
      activePointer = event.pointerId;
      try { stage.setPointerCapture(event.pointerId); } catch (_) {}
    });

    stage.addEventListener("pointermove", function (event) {
      if (!dragging || event.pointerId !== activePointer) return;
      tx += event.clientX - lastX;
      ty += event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      apply();
    });

    function endDrag(event) {
      if (event && event.pointerId !== activePointer) return;
      dragging = false;
      activePointer = null;
      try { stage.releasePointerCapture(event.pointerId); } catch (_) {}
    }

    stage.addEventListener("pointerup", endDrag);
    stage.addEventListener("pointercancel", endDrag);
    stage.addEventListener("pointerleave", function () { dragging = false; });
  }

  function initAll(root) {
    (root || document).querySelectorAll(".hs-zoomable").forEach(initZoom);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () { initAll(); });
  } else {
    initAll();
  }

  window.__hsInitZoom = initAll;
})();
</script>
</body>
</html>
